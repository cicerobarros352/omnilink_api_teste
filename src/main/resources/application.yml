spring:
  application:
    name: omnilink-api

  datasource:
    url: jdbc:mysql://localhost:3306/omnilink_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: omnilink
    password: Omnilink@2024!
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  cache:
    type: simple

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: b21uaWxpbmstYXBpLXNlY3JldC1rZXktZm9yLWp3dC0yMDI0LXN0cm9uZy1lbm91Z2g=
  expiration: 86400000 # 24 horas em ms

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.cicerobarros.omnilink_api_teste: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
